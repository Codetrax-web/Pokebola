<!DOCTYPE html>
<html lang="es">
<head>

<title>Poké Amor ❤️</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>✨ Un regalo especial ✨</h1>

    <div id="pokeball" class="pokeball">

        <div class="top"></div>

        <div class="line"></div>

        <div class="button"></div>

        <div class="bottom"></div>

    </div>


    <p id="text">
        Presiona la Pokébola
    </p>



    <div id="message" class="message">

        <h2>💖 Para ti 💖</h2>

        <p>
        Así como un entrenador busca su Pokémon favorito,
        yo encontré a alguien único y especial.
        Gracias por cada momento juntos.
        ❤️ Te quiero mucho ❤️
        </p>

    </div>



    <div id="photos" class="photos">

        <img src="img/foto1.jpg">
        <img src="img/foto2.jpg">
        <img src="img/foto3.jpg">

    </div>


</div>


<script src="script.js"></script>
