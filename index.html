<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poké Amor ❤️</title>
<link rel="icon" type="image/png" href="img/pokeball.png">
<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- Música de fondo -->
<audio id="music" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>


<!-- Sonido de apertura -->
<audio id="openSound">
    <source src="sonido.mp3" type="audio/mpeg">
</audio>



<div class="container">


<h1>
✨ Un regalo especial ✨
</h1>


<p class="subtitle">
Una sorpresa está esperando...
</p>



<!-- Zona de Pokébola -->

<div class="pokeball" id="pokeball">


    <!-- Partículas -->

    <div class="particles">

        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>



    <!-- Luz interior -->

    <div class="energy"></div>



    <!-- Pokémon -->

    <img 
    class="pokemon"
    src="img/pokemon.png"
    alt="Pokemon">



    <!-- Carta -->

    <div class="card">


        <h2>
        💖 Para ti 💖
        </h2>


        <p>

        Desde que llegaste a mi vida
        encontré algo especial.

        <br><br>

        Como un entrenador encuentra
        su Pokémon favorito,
        yo encontré a alguien único.

        <br><br>

        Gracias por todos los momentos.

        ❤️ Te quiero mucho ❤️

        </p>


    </div>


    <!-- Partes de la Pokébola -->

    <div class="top"></div>


    <div class="center">

        <div class="button"></div>

    </div>



    <div class="bottom"></div>



</div>



<button id="openBtn">

🔴 Abrir regalo

</button>



<button id="resetBtn">

🔄 Reiniciar

</button>



</div>




<script src="script.js"></script>


</body>

</html>
