<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Poké Amor ❤️</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>
✨ Un regalo especial ✨
</h1>


<p class="instruction">
🔴 Toca la Pokébola 🔴
</p>



<div class="pokeball" id="pokeball">


    <div class="poke-top"></div>


    <div class="poke-light"></div>



    <div class="gift">


        <div class="message">

            <h2>
            💖 Para ti 💖
            </h2>


            <p>

            Así como un entrenador
            busca su Pokémon favorito,
            yo encontré a alguien
            único y especial.

            <br><br>

            Gracias por cada momento juntos.

            ❤️ Te quiero mucho ❤️

            </p>


        </div>



        <div class="photos">


            <img src="img/foto1.jpg">

            <img src="img/foto2.jpg">

            <img src="img/foto3.jpg">


        </div>



    </div>



    <div class="poke-bottom"></div>



</div>



</div>



<script src="script.js"></script>


</body>

</html>
